<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset Service</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 2rem;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; }

    .lang-toggle {
      display: flex;
      gap: .25rem;
      background: #e8e8e8;
      border-radius: 6px;
      padding: .2rem;
    }
    .lang-toggle button {
      padding: .25rem .6rem;
      border: none;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      background: transparent;
      color: #666;
      transition: background .15s, color .15s;
    }
    .lang-toggle button.active { background: #fff; color: #1a1a1a; font-weight: 600; }

    /* Upload form */
    .upload-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.5rem;
      max-width: 560px;
      margin-bottom: 2rem;
    }

    .upload-card h2 { font-size: 0.875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: #666; margin-bottom: 1rem; }

    .field { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
    .field label { font-size: 0.8rem; color: #555; }
    .field input[type="text"] {
      padding: .45rem .65rem; border: 1px solid #d0d0d0; border-radius: 5px;
      font-size: 0.875rem; outline: none;
    }
    .field input[type="text"]:focus { border-color: #555; }

    .drop-zone {
      border: 2px dashed #d0d0d0;
      border-radius: 6px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      font-size: 0.875rem;
      color: #888;
      transition: border-color .15s, background .15s;
      margin-bottom: 1rem;
    }
    .drop-zone.drag-over { border-color: #555; background: #fafafa; }
    .drop-zone .chosen { color: #1a1a1a; font-weight: 500; }

    button[type="submit"] {
      width: 100%;
      padding: .6rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: opacity .15s;
    }
    button[type="submit"]:disabled { opacity: .4; cursor: default; }

    .toast {
      font-size: 0.8rem;
      padding: .5rem .75rem;
      border-radius: 5px;
      margin-top: .75rem;
      display: none;
    }
    .toast.success { background: #e6f4ea; color: #2d6a4f; display: block; }
    .toast.error   { background: #fdecea; color: #b91c1c; display: block; }

    /* File list */
    .files-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .75rem;
    }
    .files-header h2 { font-size: 0.875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: #666; }
    .files-header span { font-size: 0.8rem; color: #999; }

    .file-list { display: flex; flex-direction: column; gap: .5rem; max-width: 860px; }

    .file-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: .65rem .85rem;
    }

    .file-thumb {
      width: 36px; height: 36px;
      border-radius: 4px;
      object-fit: cover;
      background: #f0f0f0;
      flex-shrink: 0;
    }
    .file-icon {
      width: 36px; height: 36px;
      border-radius: 4px;
      background: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; color: #999; flex-shrink: 0;
    }

    .file-meta { flex: 1; min-width: 0; }
    .file-name {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-info { font-size: 0.75rem; color: #999; margin-top: .1rem; }

    .file-actions { display: flex; gap: .4rem; flex-shrink: 0; }

    .btn-copy, .btn-delete {
      padding: .3rem .6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      border: 1px solid;
      transition: opacity .15s;
    }
    .btn-copy   { background: #f5f5f5; border-color: #d0d0d0; color: #333; }
    .btn-copy:hover { background: #ebebeb; }
    .btn-delete { background: #fff0f0; border-color: #fca5a5; color: #b91c1c; }
    .btn-delete:hover { background: #fee2e2; }

    .empty { font-size: 0.875rem; color: #999; padding: 1rem 0; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1 data-i18n="title">Asset Service</h1>
    <div class="lang-toggle">
      <button id="lang-en" onclick="setLang('en')">EN</button>
      <button id="lang-zh" onclick="setLang('zh')">中文</button>
    </div>
  </div>

  <div class="upload-card">
    <h2 data-i18n="uploadTitle"></h2>
    <form id="upload-form">
      <div class="field">
        <label for="name-input" data-i18n="nameLabel"></label>
        <input type="text" id="name-input" data-i18n-placeholder="namePlaceholder" autocomplete="off" />
      </div>
      <div class="drop-zone" id="drop-zone">
        <span id="drop-label" data-i18n="dropZone"></span>
        <input type="file" id="file-input" style="display:none" />
      </div>
      <button type="submit" id="submit-btn" disabled data-i18n="uploadBtn"></button>
      <div class="toast" id="toast"></div>
    </form>
  </div>

  <div class="files-header">
    <h2 data-i18n="filesTitle"></h2>
    <span id="file-count"></span>
  </div>
  <div class="file-list" id="file-list"><p class="empty" data-i18n="loading"></p></div>

  <script>
    const translations = {
      en: {
        title:          'Asset Service',
        uploadTitle:    'Upload',
        nameLabel:      'Filename (optional — leave blank for auto)',
        namePlaceholder:'e.g. hero-banner.jpg',
        dropZone:       'Drop a file here or click to choose',
        uploadBtn:      'Upload',
        uploading:      'Uploading…',
        filesTitle:     'Files',
        fileCount:      (n) => `${n} file${n !== 1 ? 's' : ''}`,
        copyUrl:        'Copy URL',
        copied:         'Copied!',
        deleteBtn:      'Delete',
        confirmDelete:  (name) => `Delete ${name}?`,
        uploaded:       (url) => `Uploaded → ${url}`,
        empty:          'No files yet.',
        loading:        'Loading…',
        loadError:      'Failed to load files.',
        deleteError:    'Failed to delete file.',
      },
      zh: {
        title:          '资源服务',
        uploadTitle:    '上传文件',
        nameLabel:      '文件名（可选，留空则自动生成）',
        namePlaceholder:'例如：hero-banner.jpg',
        dropZone:       '拖拽文件到此处，或点击选择',
        uploadBtn:      '上传',
        uploading:      '上传中…',
        filesTitle:     '文件列表',
        fileCount:      (n) => `共 ${n} 个文件`,
        copyUrl:        '复制链接',
        copied:         '已复制',
        deleteBtn:      '删除',
        confirmDelete:  (name) => `确定删除 ${name}？`,
        uploaded:       (url) => `上传成功 → ${url}`,
        empty:          '暂无文件',
        loading:        '加载中…',
        loadError:      '加载文件失败',
        deleteError:    '删除文件失败',
      },
    }

    const defaultLang = navigator.language.startsWith('zh') ? 'zh' : 'en'
    let lang = localStorage.getItem('lang') || defaultLang

    function t(key, ...args) {
      const val = translations[lang][key]
      return typeof val === 'function' ? val(...args) : val
    }

    function setLang(l) {
      lang = l
      localStorage.setItem('lang', l)
      document.documentElement.lang = l

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n
        if (translations[lang][key] !== undefined) el.textContent = t(key)
      })
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = t(el.dataset.i18nPlaceholder)
      })

      document.getElementById('lang-en').classList.toggle('active', l === 'en')
      document.getElementById('lang-zh').classList.toggle('active', l === 'zh')

      // re-render dynamic parts
      if (!selectedFile) dropLabel.textContent = t('dropZone')
      if (!submitBtn.disabled) submitBtn.textContent = t('uploadBtn')
      const rows = document.querySelectorAll('.file-row').length
      if (rows > 0) fileCount.textContent = t('fileCount', rows)
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const dropZone  = document.getElementById('drop-zone')
    const fileInput = document.getElementById('file-input')
    const dropLabel = document.getElementById('drop-label')
    const submitBtn = document.getElementById('submit-btn')
    const nameInput = document.getElementById('name-input')
    const toast     = document.getElementById('toast')
    const fileList  = document.getElementById('file-list')
    const fileCount = document.getElementById('file-count')

    let selectedFile = null

    dropZone.addEventListener('click', () => fileInput.click())
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over') })
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'))
    dropZone.addEventListener('drop', e => {
      e.preventDefault()
      dropZone.classList.remove('drag-over')
      setFile(e.dataTransfer.files[0])
    })
    fileInput.addEventListener('change', () => setFile(fileInput.files[0]))

    function setFile(f) {
      if (!f) return
      selectedFile = f
      dropLabel.innerHTML = `<span class="chosen">${f.name}</span> (${formatSize(f.size)})`
      submitBtn.disabled = false
    }

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      if (!selectedFile) return

      submitBtn.disabled = true
      submitBtn.textContent = t('uploading')
      hideToast()

      const fd = new FormData()
      if (nameInput.value.trim()) fd.append('name', nameInput.value.trim())
      fd.append('file', selectedFile)

      try {
        const res = await fetch('/upload', { method: 'POST', body: fd })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || res.statusText)

        showToast(t('uploaded', data.url), 'success')
        selectedFile = null
        fileInput.value = ''
        nameInput.value = ''
        dropLabel.textContent = t('dropZone')
        loadFiles()
      } catch (err) {
        showToast(err.message, 'error')
      } finally {
        submitBtn.disabled = false
        submitBtn.textContent = t('uploadBtn')
      }
    })

    async function loadFiles() {
      try {
        const res = await fetch('/files')
        const files = await res.json()
        fileCount.textContent = t('fileCount', files.length)

        if (files.length === 0) {
          fileList.innerHTML = `<p class="empty">${t('empty')}</p>`
          return
        }

        fileList.innerHTML = files.map(f => `
          <div class="file-row" data-filename="${esc(f.filename)}">
            ${isImage(f.filename)
              ? `<img class="file-thumb" src="${esc(f.url)}" alt="" loading="lazy" />`
              : `<div class="file-icon">${ext(f.filename)}</div>`}
            <div class="file-meta">
              <div class="file-name" title="${esc(f.filename)}">${esc(f.filename)}</div>
              <div class="file-info">${formatSize(f.size)} · ${formatDate(f.uploadedAt)}</div>
            </div>
            <div class="file-actions">
              <button class="btn-copy" onclick="copyUrl('${esc(f.url)}', this)">${t('copyUrl')}</button>
              <button class="btn-delete" onclick="deleteFile('${esc(f.filename)}', this)">${t('deleteBtn')}</button>
            </div>
          </div>
        `).join('')
      } catch {
        fileList.innerHTML = `<p class="empty">${t('loadError')}</p>`
      }
    }

    async function deleteFile(filename, btn) {
      if (!confirm(t('confirmDelete', filename))) return
      btn.disabled = true
      try {
        const res = await fetch(`/files/${encodeURIComponent(filename)}`, { method: 'DELETE' })
        if (!res.ok) throw new Error()
        document.querySelector(`[data-filename="${CSS.escape(filename)}"]`)?.remove()
        const remaining = document.querySelectorAll('.file-row').length
        fileCount.textContent = t('fileCount', remaining)
        if (remaining === 0) fileList.innerHTML = `<p class="empty">${t('empty')}</p>`
      } catch {
        btn.disabled = false
        alert(t('deleteError'))
      }
    }

    function copyUrl(url, btn) {
      navigator.clipboard.writeText(url).then(() => {
        const orig = btn.textContent
        btn.textContent = t('copied')
        setTimeout(() => { btn.textContent = t('copyUrl') }, 1500)
      })
    }

    function showToast(msg, type) {
      toast.textContent = msg
      toast.className = `toast ${type}`
    }
    function hideToast() { toast.className = 'toast' }

    function isImage(name) { return /\.(png|jpe?g|gif|webp|svg|avif)$/i.test(name) }
    function ext(name) { return (name.split('.').pop() || '?').toUpperCase().slice(0, 4) }
    function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }
    function formatSize(b) {
      if (b < 1024) return `${b} B`
      if (b < 1024 ** 2) return `${(b/1024).toFixed(1)} KB`
      return `${(b/1024**2).toFixed(1)} MB`
    }
    function formatDate(d) {
      return new Date(d).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })
    }

    // initialise
    setLang(lang)
    loadFiles()
  </script>
</body>
</html>
