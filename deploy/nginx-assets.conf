    # Public static file serving — set location path to match ASSET_PATH, alias to match UPLOAD_DIR
    # Change /assets/ to whatever ASSET_PATH is set to in your .env
    location /assets/ {
        alias /your/upload/dir/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Asset service — UI and all APIs (upload, files list/delete)
    # proxy_pass trailing slash strips /asset-service/ prefix before forwarding to Node
    location /asset-service/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50m;
    }
